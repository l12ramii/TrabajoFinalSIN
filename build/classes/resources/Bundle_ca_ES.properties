CONTACTO_INFO = <html><div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'><b style='color: #003384; font-size: 15px;'> \u2022 Atenci\u00f3 Telef\u00f2nica (060)</b><br>Si prefereix concertar, modificar o anul\u00b7lar la seva cita per tel\u00e8fon, pot trucar al n\u00famero d'atenci\u00f3 ciutadana <b>060</b>.<br>\u2022 <i>Horari:</i> Disponible les 24 hores del dia, tots els dies de l'any (atenci\u00f3 per agent especialitzat de dilluns a divendres de 9:00 a 19:00 h).<br><br><b style='color: #003384; font-size: 15px;'> \u2022 Suport T\u00e8cnic i Consultes</b><br>Per a incid\u00e8ncies amb la plataforma web, problemes en tramitar les seves dades o consultes sobre la documentaci\u00f3 necess\u00e0ria, pot escriure a l'adre\u00e7a de correu oficial:<br><div style='margin-left: 15px; margin-top: 4px; margin-bottom: 4px;'><b>\ud83d\udce7 sac@dgp.es</b> (Servei d'Atenci\u00f3 al Ciutad\u00e0)</div><i>Per motius de seguretat, no adjunti c\u00f2pies dels seus documents d'identitat al correu electr\u00f2nic.</i><br><br><b style='color: #003384; font-size: 15px;'> \u2022 Oficines d'Expedici\u00f3</b><br>Recordi que els tr\u00e0mits presencials es realitzen exclusivament a les Prefectures Superiors i Comissaries de Policia habilitades. Pot consultar l'ubicaci\u00f3 i l'horari espec\u00edfic de la seva oficina local durant el proc\u00e9s de selecci\u00f3 de cita en aquest web.</div></html>
