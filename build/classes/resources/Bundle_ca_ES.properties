TEXTO_AYUDA=<html> <div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'>      <b style='color: #003384; font-size: 15px;'> 1. El primer pas: Iniciar el tr\u00e0mit</b><br>   Per comen\u00e7ar qualsevol gesti\u00f3, el primer que has de fer \u00e9s pr\u00e9mer el bot\u00f3 "Iniciar tr\u00e0mit" que trobar\u00e0s a la pantalla principal. Aix\u00f2 et portar\u00e0 a la zona segura d'identificaci\u00f3.<br><br>    <b style='color: #003384; font-size: 15px;'> 2. Com puc accedir al sistema?</b><br>   Un cop a dins, el sistema t'oferir\u00e0 tres opcions per identificar-te segons la teva situaci\u00f3 actual. Tria la que et correspongui:<br><br>    <div style='margin-left: 15px;'>      <b>\u2022 Opci\u00f3 A: Acc\u00e9s amb DNI</b><br>      <i>Fes servir aquesta opci\u00f3 si ets ciutad\u00e0 espanyol i tens el teu document a m\u00e0.</i><br>      haur\u00e0s d'introduir el n\u00famero del teu DNI (amb la lletra), la seva data de validesa i el codi de l'Equip d'Expedici\u00f3 (les dades que apareixen a la targeta f\u00edsica).<br><br>       <b>\u2022 Opci\u00f3 B: Acc\u00e9s amb NIE</b><br>      <i>Fes servir aquesta opci\u00f3 si ets estranger resident a Espanya.</i><br>      Haur\u00e0s d'introduir el teu n\u00famero de NIE (que comen\u00e7a per X, Y o Z) juntament amb el "N\u00famero de suport" que apareix a la teva targeta de resid\u00e8ncia verda o f\u00edsica.<br><br>       <b>\u2022 Opci\u00f3 C: Has perdut o t'han robat el document?</b><br>      <i>Si no disposes de les dades anteriors perqu\u00e8 has perdut el teu DNI o el teu NIE (o si te l'han sostret), selecciona l'enlla\u00e7 de "P\u00e8rdua o sostracci\u00f3 de document".</i><br>      El sistema et demanar\u00e0 unes dades personals b\u00e0siques per verificar la teva identitat i et permetr\u00e0 continuar amb el tr\u00e0mit per poder obtenir un duplicat o renovaci\u00f3.   </div>  </div> </html>
