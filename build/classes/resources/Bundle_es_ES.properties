CONTACTO_INFO = <html><div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'><b style='color: #003384; font-size: 15px;'> \u2022 Atenci\u00f3n Telef\u00f3nica (060)</b><br>Si prefiere concertar, modificar o anular su cita por tel\u00e9fono, puede llamar al n\u00famero de atenci\u00f3n ciudadana <b>060</b>.<br>\u2022 <i>Horario:</i> Disponible las 24 horas del d\u00eda, todos los d\u00edas del a\u00f1o (atenci\u00f3n por agente especializado de lunes a viernes de 9:00 a 19:00 h).<br><br><b style='color: #003384; font-size: 15px;'> \u2022 Soporte T\u00e9cnico y Consultas</b><br>Para incidencias con la plataforma web, problemas al tramitar sus datos o consultas sobre la documentaci\u00f3n necesaria, puede escribir a la direcci\u00f3n de correo oficial:<br><div style='margin-left: 15px; margin-top: 4px; margin-bottom: 4px;'><b>\ud83d\udce7 sac@dgp.es</b> (Servicio de Atenci\u00f3n al Ciudadano)</div><i>Por motivos de seguridad, no adjunte copias de sus documentos de identidad en el correo electr\u00f3nico.</i><br><br><b style='color: #003384; font-size: 15px;'> \u2022 Oficinas de Expedici\u00f3n</b><br>Recuerde que los tr\u00e1mites presenciales se realizan exclusivamente en las Jefaturas Superiores y Comisar\u00edas de Polic\u00eda habilitadas. Puede consultar la ubicaci\u00f3n y el horario espec\u00edfico de su oficina local durante el proceso de selecci\u00f3n de cita en esta web.</div></html>
