TEXTO_AYUDA=<html> <div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'>      <b style='color: #003384; font-size: 15px;'> 1. El primer paso: Iniciar el tr\u00e1mite</b><br>   Para comenzar cualquier gesti\u00f3n, lo primero que debes hacer es pulsar el bot\u00f3n "Iniciar tr\u00e1mite" que encontrar\u00e1s en la pantalla principal. Esto te llevar\u00e1 a la zona segura de identificaci\u00f3n.<br><br>    <b style='color: #003384; font-size: 15px;'> 2. \u00bfC\u00f3mo puedo acceder al sistema?</b><br>   Una vez dentro, el sistema te ofrecer\u00e1 tres opciones para identificarte seg\u00fan tu situaci\u00f3n actual. Elige la que te corresponda:<br><br>    <div style='margin-left: 15px;'>     <b>\u2022 Opci\u00f3n A: Acceso con DNI</b><br>     <i>Usa esta opci\u00f3n si eres ciudadano espa\u00f1ol y tienes tu documento a mano.</i><br>     Deber\u00e1s introducir el n\u00famero de tu DNI (con la letra), su fecha de validez y el c\u00f3digo del Equipo de Expedici\u00f3n (los datos que aparecen en la tarjeta f\u00edsica).<br><br>      <b>\u2022 Opci\u00f3n B: Acceso con NIE</b><br>     <i>Usa esta opci\u00f3n si eres extranjero residente en Espa\u00f1a.</i><br>     Deber\u00e1s introducir tu n\u00famero de NIE (que empieza por X, Y o Z) junto con el "N\u00famero de soporte" que aparece en tu tarjeta de residencia verde o f\u00edsica.<br><br>      <b>\u2022 Opci\u00f3n C: \u00bfHas perdido o te han robado el documento?</b><br>     <i>Si no dispones de los datos anteriores porque has perdido tu DNI o tu NIE (o si te lo han sustra\u00eddo), selecciona el enlace de "P\u00e9rdida o sustracci\u00f3n de documento".</i><br>     El sistema te pedir\u00e1 unos datos personales b\u00e1sicos para verificar tu identidad y te permitir\u00e1 continuar con el tr\u00e1mite para poder obtener un duplicado o renovaci\u00f3n.   </div>  </div> </html>
