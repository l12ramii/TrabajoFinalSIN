TEXTO_AYUDA=<html> <div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'>      <b style='color: #003384; font-size: 15px;'> 1. The first step: Start the process</b><br>   To start any procedure, the first thing you must do is press the "Start process" button found on the main screen. This will take you to the secure identification area.<br><br>    <b style='color: #003384; font-size: 15px;'> 2. How can I access the system?</b><br>   Once inside, the system will offer you three options to identify yourself according to your current situation. Choose the one that corresponds to you:<br><br>    <div style='margin-left: 15px;'>      <b>\u2022 Option A: Access with ID (DNI)</b><br>      <i>Use this option if you are a Spanish citizen and have your document at hand.</i><br>      You must enter your ID number (with the letter), its expiry date, and the Issuing Team code (the data shown on the physical card).<br><br>       <b>\u2022 Option B: Access with NIE</b><br>      <i>Use this option if you are a foreign resident in Spain.</i><br>      You must enter your NIE number (starting with X, Y, or Z) along with the "Support number" that appears on your green or physical residence card.<br><br>       <b>\u2022 Option C: Have you lost or had your document stolen?</b><br>      <i>If you do not have the previous data because you have lost your ID or NIE (or if it has been stolen), select the "Loss or theft of document" link.</i><br>      The system will ask for basic personal data to verify your identity and allow you to continue with the process to obtain a duplicate or renewal.   </div>  </div> </html>
