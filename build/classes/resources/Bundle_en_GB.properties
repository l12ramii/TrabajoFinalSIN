CONTACTO_INFO = <html><div style='width: 480px; text-align: justified; font-family: Arial; color: #000000; line-height: 1.4;'><b style='color: #003384; font-size: 15px;'> \u2022 Telephone Assistance (060)</b><br>If you prefer to book, modify, or cancel your appointment by phone, you can call the citizen service number <b>060</b>.<br>\u2022 <i>Hours:</i> Available 24 hours a day, every day of the year (specialised agent assistance from Monday to Friday, 9:00 to 19:00).<br><br><b style='color: #003384; font-size: 15px;'> \u2022 Technical Support and Inquiries</b><br>For technical issues with the web platform, problems processing your data, or questions regarding required documentation, you may write to the official email address:<br><div style='margin-left: 15px; margin-top: 4px; margin-bottom: 4px;'><b>\ud83d\udce7 sac@dgp.es</b> (Citizen Service Department)</div><i>For security reasons, do not attach copies of your identity documents to the email.</i><br><br><b style='color: #003384; font-size: 15px;'> \u2022 Issuing Offices</b><br>Please remember that in-person procedures are carried out exclusively at authorized National Police Headquarters and Stations. You can check the location and specific hours of your local office during the appointment selection process on this website.</div></html>
